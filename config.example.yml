# LOTL Detector Configuration Example
#
# Copy this file to config.yml and customize as needed:
#   cp config.example.yml config.yml
#
# All settings are optional - if omitted, defaults will be used.

# Database configuration
database:
  # Path to SQLite database file for storing alerts
  # Default: alerts.db
  path: alerts.db

# Detection rules configuration
rules:
  # Directory containing YAML detection rules
  # Default: rules/
  directory: rules/

# Logging configuration
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  # Default: INFO
  level: INFO

  # Log file path
  # Default: detector.log
  file: detector.log

# REST API server configuration
api:
  # Host to bind API server to
  # 127.0.0.1 - Listen only on localhost (recommended, default)
  # 0.0.0.0 - Listen on all interfaces (use with reverse proxy + TLS)
  # Default: 127.0.0.1
  host: 127.0.0.1

  # Port for API server
  # Must be between 1 and 65535
  # Default: 5000
  port: 5000

  # Enable Flask debug mode
  # WARNING: Never enable in production!
  # Default: false
  debug: false

# Log source scanning configuration
scan:
  # Allowed root directories for log file scanning.
  # When set, the /api/scan endpoint only accepts paths within these roots.
  # Symlinks are resolved before containment check.
  # Empty list allows any path (less secure, use only for development).
  # Default: [] (allow any)
  # Example:
  # allowed_roots:
  #   - /var/log
  #   - /opt/lotl/logs
  #   - C:\Logs
  allowed_roots: []

  # Maximum file size in MB for individual log files
  # Default: 100
  max_file_size_mb: 100
