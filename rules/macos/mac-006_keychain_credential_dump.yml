name: "Keychain Credential Access via security"
id: "MAC-006"
platform: macos
severity: critical
mitre_attack:
  - T1555.001
description: |
  Detects the security command dumping or extracting secrets from a macOS
  keychain. Attackers use security dump-keychain and find-*-password to
  harvest stored credentials, tokens, and certificates after gaining code
  execution. Reading individual entries can be legitimate, but bulk
  dumping of the login keychain is a strong credential-theft signal.
detection:
  process_name: "security"
  command_contains_any:
    - "dump-keychain"
    - "find-generic-password"
    - "find-internet-password"
false_positives:
  - "Password managers or backup tooling that read specific entries."
  - "Administrative scripts retrieving a known service credential."
whitelist:
  parent_processes:
    - "com.apple.keychainaccess"
  users:
    - "_securityagent"
  paths:
    - "/opt/company/secrets-tooling/"
response:
  - "Determine which keychain and entries were accessed."
  - "Rotate credentials, tokens, and certificates stored in that keychain."
  - "Identify the process and user that invoked security."
  - "Isolate the host and review for follow-on lateral movement."
