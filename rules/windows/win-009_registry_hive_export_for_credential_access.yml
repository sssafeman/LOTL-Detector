name: "Registry Hive Export for Credential Access"
id: "WIN-009"
platform: windows
severity: critical
mitre_attack:
  - T1003.002
description: |
  Detects reg.exe saving the SAM, SYSTEM, or SECURITY registry hive. Attackers
  export these hives for offline extraction of password hashes, cached
  credentials, LSA secrets, and related authentication material.
detection:
  process_name: "reg.exe"
  command_contains:
    - "save"
  command_contains_any:
    - "HKLM\\SAM"
    - "HKLM\\SYSTEM"
    - "HKLM\\SECURITY"
    - "HKEY_LOCAL_MACHINE\\SAM"
    - "HKEY_LOCAL_MACHINE\\SYSTEM"
    - "HKEY_LOCAL_MACHINE\\SECURITY"
false_positives:
  - "Documented forensic acquisition performed by an incident response team."
  - "Registry-aware backup software exporting protected hives."
whitelist:
  parent_processes:
    - "BackupAgent.exe"
    - "ForensicCollector.exe"
  users:
    - "svc_backup"
  paths:
    - "D:\\ApprovedBackups\\Registry\\"
response:
  - "Treat the event as suspected credential access until disproven."
  - "Identify the destination files and preserve them as evidence."
  - "Search for subsequent archive creation, file transfer, secretsdump, or Mimikatz activity."
  - "Review privilege elevation and logon events preceding the export."
  - "Contain the endpoint and rotate exposed local credentials when unauthorized."
