name: "Msiexec Remote Package Execution"
id: "WIN-010"
platform: windows
severity: high
mitre_attack:
  - T1218.007
  - T1105
description: |
  Detects msiexec.exe installing or processing an MSI package directly from
  an HTTP or HTTPS location. Attackers use this trusted binary to retrieve
  and execute malicious installer content.
detection:
  process_name: "msiexec.exe"
  command_contains_any:
    - "http://"
    - "https://"
  command_regex: '(?i)(?:^|\s)(?:/i|/package)\s+https?://'
false_positives:
  - "Approved software deployment directly from a trusted internal package repository."
  - "A vendor bootstrapper that delegates a documented HTTPS MSI URL to msiexec.exe."
whitelist:
  parent_processes:
    - "CcmExec.exe"
    - "CompanySoftwareCenter.exe"
  users:
    - "svc_deployment"
  paths:
    - "C:\\ProgramData\\Company\\Packages\\"
response:
  - "Extract the MSI URL, domain, path, and package name."
  - "Check DNS, proxy, certificate, and reputation data for the source."
  - "Acquire and analyze the MSI without executing it."
  - "Review processes, services, scheduled tasks, and files created by msiexec.exe."
  - "Compare the installation with approved software deployment records."
